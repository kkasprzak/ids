# Advisory findings are WORK TRIGGERS, not judgment prompts. Each finding is a lamp
# saying "investigate this against our architecture." For every finding in changed
# files, follow this protocol — do not shortcut it:
#
#   1. Assume it is a real defect until proven compliant. The burden of proof is
#      "show it is consistent with our architecture", never "show it is broken".
#   2. Investigate against the source of truth: open ARCHITECTURE.md (and decision
#      records) and find the clause governing that layer/boundary. Do not reason from
#      a general recollection of how hexagonal architecture "usually" works.
#   3. Default verdict is FIX. Mark a finding acceptable ONLY when you can cite the
#      explicit ARCHITECTURE.md clause that positively permits it. "No rule forbids
#      it" is NOT sufficient grounds for acceptance.
#   4. Cite that clause in your report. An "acceptable" verdict without a citation is
#      invalid — it keeps the reasoning auditable and blocks status-quo rationalizing.
rules:
  - id: ids.review-broad-mapping-contract
    message: |
      Review whether this broad mapping belongs in a domain/application contract.

      `dict[str, object]` and `Mapping[str, object]` hide the payload shape from the
      type checker and often let external YAML/JSON/frontmatter data leak inward.
      Prefer a named alias, dataclass, value object, TypedDict, or explicit union.

      Default action: FIX. Accept only by citing the ARCHITECTURE.md clause that
      positively permits it (see the protocol at the top of this file).
    severity: INFO
    languages: [python]
    paths:
      include:
        - "**/src/ids/domain/**"
        - "**/src/ids/application/**"
    pattern-either:
      - pattern: |
          $FIELD: dict[str, object]
      - pattern: |
          $FIELD: dict[str, object] = $VALUE
      - pattern: |
          $FIELD: Mapping[str, object]
      - pattern: |
          $FIELD: Mapping[str, object] = $VALUE
      - pattern: |
          def $FUNC(..., $ARG: dict[str, object], ...):
            ...
      - pattern: |
          async def $FUNC(..., $ARG: dict[str, object], ...):
            ...
      - pattern: |
          def $FUNC(...) -> dict[str, object]:
            ...
      - pattern: |
          async def $FUNC(...) -> dict[str, object]:
            ...
      - pattern: |
          def $FUNC(..., $ARG: Mapping[str, object], ...):
            ...
      - pattern: |
          async def $FUNC(..., $ARG: Mapping[str, object], ...):
            ...
      - pattern: |
          def $FUNC(...) -> Mapping[str, object]:
            ...
      - pattern: |
          async def $FUNC(...) -> Mapping[str, object]:
            ...
      - pattern: |
          $NAME: TypeAlias = dict[str, object]
      - pattern: |
          $NAME: TypeAlias = Mapping[str, object]
      - pattern: |
          type $NAME = dict[str, object]
      - pattern: |
          type $NAME = Mapping[str, object]

  - id: ids.review-broad-exception-handler
    message: |
      Review whether this broad exception handler belongs in domain/application code.

      Catching Exception here can hide missing error boundaries or domain-specific
      failure modes. Prefer catching concrete exceptions, or move broad exception
      translation to an adapter boundary.

      Default action: FIX. Accept only by citing the ARCHITECTURE.md clause that
      positively permits it (see the protocol at the top of this file).
    severity: INFO
    languages: [python]
    paths:
      include:
        - "**/src/ids/domain/**"
        - "**/src/ids/application/**"
    pattern-either:
      - pattern: |
          try:
            ...
          except Exception:
            ...
      - pattern: |
          try:
            ...
          except Exception as $EXC:
            ...

  - id: ids.review-string-canonicalization
    message: |
      Review whether this string canonicalization belongs here.

      Repeated trim/case normalization often signals a missing value object, enum
      parser, or boundary conversion. Prefer passing raw external values into a
      named domain type or parser that owns the canonical representation.

      Default action: FIX. Accept only by citing the ARCHITECTURE.md clause that
      positively permits it (see the protocol at the top of this file).
    severity: INFO
    languages: [python]
    paths:
      include:
        - "**/src/ids/domain/**"
        - "**/src/ids/application/**"
        - "**/src/ids/infrastructure/**"
      exclude:
        - "**/src/ids/domain/value_objects.py"
    pattern-either:
      - pattern: $VALUE.strip().upper()
      - pattern: $VALUE.strip().lower()
      - pattern: $VALUE.casefold()

  - id: ids.review-bare-object-contract
    message: |
      Review whether this bare `object` belongs in a domain/application contract.

      It weakens the contract and often hides a missing domain concept or leaked
      boundary payload. Prefer a named type, value object, dataclass, enum,
      Protocol, or explicit union.

      Default action: FIX. Accept only by citing the ARCHITECTURE.md clause that
      positively permits it (see the protocol at the top of this file).
    severity: INFO
    languages: [python]
    paths:
      include:
        - "**/src/ids/domain/**"
        - "**/src/ids/application/**"
    pattern-either:
      - pattern: |
          $NAME: object
      - pattern: |
          def $FUNC(..., $ARG: object, ...):
            ...
      - pattern: |
          def $FUNC(...) -> object:
            ...

  - id: ids.prefer-value-object-over-primitive
    message: |
      Review whether this primitive should be a domain value object.

      The domain defines value objects for these concepts (`Price` for per-instrument
      prices, `Symbol` for instrument tickers). A bare `Decimal`/`str` here
      re-introduces the primitive the value object exists to replace, and forces
      producers to unwrap the value object at the boundary. When a DTO projects a
      domain model, take each field's type from the corresponding model field — not
      from test data.

      Default action: FIX (use the value object). Accept only by citing the
      ARCHITECTURE.md clause that positively permits the primitive (see the protocol
      at the top of this file).
    severity: INFO
    languages: [python]
    paths:
      include:
        - "**/src/ids/domain/**"
        - "**/src/ids/application/**"
      exclude:
        - "**/src/ids/domain/value_objects.py"
    pattern-either:
      - patterns:
          - pattern: "$FIELD: Decimal"
          - metavariable-regex:
              metavariable: $FIELD
              regex: (?i).*price
      - patterns:
          - pattern: "$FIELD: Decimal | None"
          - metavariable-regex:
              metavariable: $FIELD
              regex: (?i).*price
      - patterns:
          - pattern: "$FIELD: str"
          - metavariable-regex:
              metavariable: $FIELD
              regex: ^symbol$
