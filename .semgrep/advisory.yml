rules:
  - id: ids.review-broad-mapping-contract
    message: |
      Review whether this broad mapping belongs in a domain/application contract.

      `dict[str, object]` and `Mapping[str, object]` hide the payload shape from the
      type checker and often let external YAML/JSON/frontmatter data leak inward.
      Prefer a named alias, dataclass, value object, TypedDict, or explicit union. If
      this is intentional boundary data, keep it at the adapter edge or explain why
      it belongs here.
    severity: INFO
    languages: [python]
    paths:
      include:
        - "**/src/ids/domain/**"
        - "**/src/ids/application/**"
    pattern-either:
      - pattern: |
          $FIELD: dict[str, object]
      - pattern: |
          $FIELD: dict[str, object] = $VALUE
      - pattern: |
          $FIELD: Mapping[str, object]
      - pattern: |
          $FIELD: Mapping[str, object] = $VALUE
      - pattern: |
          def $FUNC(..., $ARG: dict[str, object], ...):
            ...
      - pattern: |
          async def $FUNC(..., $ARG: dict[str, object], ...):
            ...
      - pattern: |
          def $FUNC(...) -> dict[str, object]:
            ...
      - pattern: |
          async def $FUNC(...) -> dict[str, object]:
            ...
      - pattern: |
          def $FUNC(..., $ARG: Mapping[str, object], ...):
            ...
      - pattern: |
          async def $FUNC(..., $ARG: Mapping[str, object], ...):
            ...
      - pattern: |
          def $FUNC(...) -> Mapping[str, object]:
            ...
      - pattern: |
          async def $FUNC(...) -> Mapping[str, object]:
            ...
      - pattern: |
          $NAME: TypeAlias = dict[str, object]
      - pattern: |
          $NAME: TypeAlias = Mapping[str, object]
      - pattern: |
          type $NAME = dict[str, object]
      - pattern: |
          type $NAME = Mapping[str, object]

  - id: ids.review-broad-exception-handler
    message: |
      Review whether this broad exception handler belongs in domain/application code.

      Catching Exception here can hide missing error boundaries or domain-specific
      failure modes. Prefer catching concrete exceptions, or move broad exception
      translation to an adapter boundary.
    severity: INFO
    languages: [python]
    paths:
      include:
        - "**/src/ids/domain/**"
        - "**/src/ids/application/**"
    pattern-either:
      - pattern: |
          try:
            ...
          except Exception:
            ...
      - pattern: |
          try:
            ...
          except Exception as $EXC:
            ...

  - id: ids.review-string-canonicalization
    message: |
      Review whether this string canonicalization belongs in domain/application code.

      Repeated trim/case normalization often signals a missing value object, enum
      parser, or boundary conversion. Prefer normalizing once at the adapter edge
      or inside a named domain type that owns the canonical representation.
    severity: INFO
    languages: [python]
    paths:
      include:
        - "**/src/ids/domain/**"
        - "**/src/ids/application/**"
      exclude:
        - "**/src/ids/domain/value_objects.py"
    pattern-either:
      - pattern: $VALUE.strip().upper()
      - pattern: $VALUE.strip().lower()
      - pattern: $VALUE.casefold()

  - id: ids.review-bare-object-contract
    message: |
      Review whether this bare `object` belongs in a domain/application contract.

      It weakens the contract and often hides a missing domain concept or leaked
      boundary payload. Prefer a named type, value object, dataclass, enum,
      Protocol, or explicit union. If this is intentional boundary data, keep it at
      the adapter edge or explain why it belongs here.
    severity: INFO
    languages: [python]
    paths:
      include:
        - "**/src/ids/domain/**"
        - "**/src/ids/application/**"
    pattern-either:
      - pattern: |
          $NAME: object
      - pattern: |
          def $FUNC(..., $ARG: object, ...):
            ...
      - pattern: |
          def $FUNC(...) -> object:
            ...
