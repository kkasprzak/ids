rules:
  - id: ids.no-base-exception
    message: Catch concrete exceptions instead of BaseException in IDS code.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "**/src/ids/**"
        - "**/tests/**"
    pattern: |
      try:
        ...
      except BaseException:
        ...

  - id: ids.no-utcnow
    message: Avoid datetime.utcnow(); use timezone-aware datetimes instead.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "**/src/ids/**"
        - "**/tests/**"
    pattern-either:
      - pattern: datetime.utcnow()
      - pattern: datetime.utcnow(...)

  - id: ids.tests.no-sleep
    message: Avoid time.sleep() in tests; use deterministic synchronization or a frozen clock.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "**/tests/**"
    pattern-either:
      - pattern: time.sleep()
      - pattern: time.sleep(...)
